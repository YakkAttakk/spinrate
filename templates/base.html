<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SpinRate{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0f0e0d;
      --paper: #f5f0e8;
      --cream: #ede7d6;
      --accent: #c8402a;
      --accent-dim: #9c3220;
      --muted: #7a7268;
      --border: #d4cdbf;
      --gold: #b8922a;
      --card: #fff9f0;
      --mono: 'DM Mono', monospace;
      --serif: 'Playfair Display', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.65;
      min-height: 100vh;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* NAV */
    nav {
      background: var(--ink);
      color: var(--paper);
      display: flex;
      align-items: center;
      gap: 2rem;
      padding: 0 2rem;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 3px solid var(--accent);
    }
    .nav-logo {
      font-family: var(--serif);
      font-size: 1.4rem;
      color: var(--paper);
      text-decoration: none;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }
    .nav-logo span { color: var(--accent); font-style: italic; }
    .nav-links { display: flex; gap: 1.5rem; flex: 1; }
    .nav-links a {
      color: var(--border);
      text-decoration: none;
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.15s;
    }
    .nav-links a:hover { color: var(--paper); }
    .nav-user {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .nav-user a { color: var(--accent); text-decoration: none; }
    .nav-user a:hover { text-decoration: underline; }

    /* LAYOUT */
    .container { max-width: 1060px; margin: 0 auto; padding: 2.5rem 1.5rem; }
    .page-header {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .page-header h1 {
      font-family: var(--serif);
      font-size: 2.4rem;
      line-height: 1.15;
      letter-spacing: -0.5px;
    }
    .page-header p { color: var(--muted); margin-top: 0.4rem; }

    /* CARDS */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1.5rem;
    }

    /* REVIEW CARD */
    .review-card {
      display: flex;
      flex-direction: row;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      transition: border-color 0.15s, box-shadow 0.15s;
      align-items: stretch;
    }
    .review-card:hover {
      border-color: var(--accent);
      box-shadow: 3px 3px 0 var(--accent);
    }
    .review-card-body {
      flex: 1;
      min-width: 0;
      padding: 0.75rem 1rem;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }
    .review-card .cover-wrap {
      flex-shrink: 0;
      align-self: stretch;
      aspect-ratio: 1 / 1;
    }
    .review-card .cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .review-card .cover-placeholder {
      width: 100%;
      height: 100%;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    .review-meta {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.2rem;
    }
    .review-meta a { color: var(--accent); text-decoration: none; }
    .review-meta a:hover { text-decoration: underline; }
    .review-album { font-family: var(--serif); font-size: 1rem; line-height: 1.2; }
    .review-album a { color: var(--ink); text-decoration: none; }
    .review-album a:hover { color: var(--accent); }
    .review-artist {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.1rem;
      font-family: var(--sans);
    }
    .review-artist a { color: var(--muted); text-decoration: none; }
    .review-artist a:hover { color: var(--accent); }
    .review-body {
      font-size: 0.85rem;
      color: #3a3530;
      margin-top: 0.4rem;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* STARS */
    .stars { display: inline-flex; gap: 2px; }
    .stars .s { font-size: 0.9rem; }
    .stars .s.on  { color: var(--gold); }
    .stars .s.off { color: var(--border); }

    /* FEED */
    .feed { display: flex; flex-direction: column; gap: 1rem; }

    /* ALBUM GRID */
    .album-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1.2rem;
    }
    .album-tile {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s, border-color 0.15s;
      display: block;
    }
    .album-tile:hover {
      border-color: var(--accent);
      box-shadow: 3px 3px 0 var(--accent);
    }
    .album-tile img, .album-tile .cover-ph {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    .album-tile-info { padding: 0.7rem 0.75rem; }
    .album-tile-title { font-family: var(--serif); font-size: 0.9rem; line-height: 1.3; }
    .album-tile-sub { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); margin-top: 0.2rem; }

    /* FORMS */
    .form-group { margin-bottom: 1.2rem; }
    label {
      display: block;
      font-family: var(--mono);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    input[type=text], input[type=password], textarea, select {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--paper);
      font-family: var(--sans);
      font-size: 0.9rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 120px; }

    /* STAR PICKER */
    .star-picker { display: flex; gap: 6px; flex-direction: row-reverse; justify-content: flex-end; }
    .star-picker input { display: none; }
    .star-picker label {
      font-size: 2rem;
      color: var(--border);
      cursor: pointer;
      margin: 0;
      text-transform: none;
      letter-spacing: 0;
      transition: color 0.1s;
    }
    .star-picker input:checked ~ label,
    .star-picker label:hover,
    .star-picker label:hover ~ label { color: var(--gold); }

    /* BUTTONS */
    .btn {
      display: inline-block;
      padding: 0.6rem 1.4rem;
      font-family: var(--mono);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border: 2px solid var(--ink);
      background: var(--ink);
      color: var(--paper);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      border-radius: 1px;
    }
    .btn:hover { background: var(--accent); border-color: var(--accent); }
    .btn-outline {
      background: transparent;
      color: var(--ink);
    }
    .btn-outline:hover { background: var(--ink); color: var(--paper); }
    .btn-danger { border-color: var(--accent); background: transparent; color: var(--accent); }
    .btn-danger:hover { background: var(--accent); color: var(--paper); }

    /* ALERT */
    .alert {
      padding: 0.8rem 1rem;
      border-left: 3px solid var(--accent);
      background: #fdf0ee;
      color: var(--accent-dim);
      font-size: 0.875rem;
      margin-bottom: 1.2rem;
    }

    /* BADGE */
    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      font-family: var(--mono);
      font-size: 0.68rem;
      border: 1px solid currentColor;
      border-radius: 2px;
    }

    /* DIVIDER */
    hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

    /* UTIL */
    .text-muted { color: var(--muted); }
    .text-mono { font-family: var(--mono); font-size: 0.8rem; }
    .mt1 { margin-top: 0.5rem; }
    .mt2 { margin-top: 1rem; }
    .mt3 { margin-top: 1.5rem; }
    .flex { display: flex; }
    .gap1 { gap: 0.5rem; }
    .gap2 { gap: 1rem; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .wrap { flex-wrap: wrap; }

    /* Search autocomplete */
    .autocomplete-wrap { position: relative; }
    .autocomplete-list {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      z-index: 200;
      max-height: 320px;
      overflow-y: auto;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.08);
    }
    .autocomplete-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0.85rem;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover { background: var(--cream); }
    .autocomplete-item img {
      width: 40px; height: 40px; object-fit: cover;
      border: 1px solid var(--border); flex-shrink: 0;
    }
    .autocomplete-item .ac-title { font-family: var(--serif); font-size: 0.9rem; }
    .autocomplete-item .ac-sub  { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); }

    /* Wiki box */
    .wiki-box {
      background: var(--cream);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold);
      padding: 0.85rem 1rem;
      font-size: 0.85rem;
      color: #4a4540;
      margin-top: 0.75rem;
      display: none;
    }
    .wiki-box a { color: var(--accent); }

    /* Profile header */
    .profile-header {
      display: flex;
      align-items: flex-start;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .avatar-circle {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--ink);
      color: var(--paper);
      font-family: var(--serif);
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 2px solid var(--accent);
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.8rem;
    }
    .empty .big { font-size: 3rem; margin-bottom: 0.75rem; }

    @media (max-width: 600px) {
      nav { padding: 0 1rem; gap: 1rem; }
      .nav-links { gap: 0.75rem; }
      .container { padding: 1.5rem 1rem; }
      .review-card { grid-template-columns: 60px 1fr; }
      .review-card .cover, .review-card .cover-placeholder { width: 60px; height: 60px; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {% if session.user_id %}
  <nav>
    <a class="nav-logo" href="/">Spin<span>Rate</span></a>
    <div class="nav-links">
      <a href="/">Feed</a>
      <a href="/new-review">+ Review</a>
      <a href="/members">Members</a>
    </div>
    <div class="nav-user">
      <a href="/profile/{{ me.username if me else '' }}">{{ me.username if me else '' }}</a>
      <a href="/logout">logout</a>
    </div>
  </nav>
  {% endif %}

  {% block body %}{% endblock %}

  <script>
    // Star helpers used across pages
    function renderStars(rating, total=5) {
      let out = '<span class="stars">';
      for (let i = 1; i <= total; i++) {
        out += `<span class="s ${i <= rating ? 'on' : 'off'}">★</span>`;
      }
      out += '</span>';
      return out;
    }
    document.querySelectorAll('[data-stars]').forEach(el => {
      el.innerHTML = renderStars(parseInt(el.dataset.stars));
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
