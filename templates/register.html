{% extends "base.html" %}
{% block title %}Register — SpinRate{% endblock %}
{% block body %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--ink);">
  <div style="width:100%;max-width:380px;padding:1rem;">
    <div style="text-align:center;margin-bottom:2rem;">
      <a href="/login" style="font-family:var(--serif);font-size:2.5rem;color:var(--paper);text-decoration:none;">
        Spin<span style="color:var(--accent);font-style:italic;">Rate</span>
      </a>
    </div>

    <div class="card">
      <div style="font-family:var(--mono);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:1.2rem;">Create Account</div>
      {% if error %}<div class="alert">{{ error }}</div>{% endif %}
      <form method="post">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" required autofocus maxlength="30">
        </div>
        <div class="form-group">
          <label>Password (min 4 chars)</label>
          <input type="password" name="password" required minlength="4">
        </div>
        <div class="form-group">
          <label>Bio <span style="font-weight:300;text-transform:none;">(optional)</span></label>
          <textarea name="bio" rows="2" placeholder="A few words about your music taste…"></textarea>
        </div>
        <button type="submit" class="btn" style="width:100%;">Create Account</button>
      </form>
      <div style="text-align:center;margin-top:1.2rem;font-size:0.82rem;color:var(--muted);">
        Already have one? <a href="/login" style="color:var(--accent);">Sign in</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
