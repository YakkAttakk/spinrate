{% extends "base.html" %}
{% block title %}Login — SpinRate{% endblock %}
{% block body %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--ink);">
  <div style="width:100%;max-width:380px;padding:1rem;">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="font-family:var(--serif);font-size:2.5rem;color:var(--paper);">
        Spin<span style="color:var(--accent);font-style:italic;">Rate</span>
      </div>
      <div style="font-family:var(--mono);font-size:0.72rem;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-top:0.3rem;">
        Music reviews for friends
      </div>
    </div>

    <div class="card" style="background:var(--card);">
      {% if error %}<div class="alert">{{ error }}</div>{% endif %}
      <form method="post">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" autocomplete="username" required autofocus>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn" style="width:100%;">Sign In</button>
      </form>
      <div style="text-align:center;margin-top:1.2rem;font-size:0.82rem;color:var(--muted);">
        No account? <a href="/register" style="color:var(--accent);">Create one</a>
      </div>
    </div>

    <div style="text-align:center;margin-top:1.5rem;font-family:var(--mono);font-size:0.68rem;color:#3a3530;letter-spacing:0.06em;">
      Private — login required to see reviews
    </div>
  </div>
</div>
{% endblock %}
