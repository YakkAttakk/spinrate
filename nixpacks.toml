[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "python311Packages.gunicorn"]

[phases.install]
cmds = ["python3.11 -m pip install -r requirements.txt"]

[phases.build]
cmds = ["python3.11 init_db.py"]

[start]
cmd = "python3.11 -m gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
